name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tdd-diff-check:
    # Hard rule: lib/ changes require test/ changes. Mirrors the lefthook
    # pre-commit gate so a --no-verify commit doesn't slip through CI.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify test/ changes accompany lib/ changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          lib_changed=$(git diff --name-only "$base" "$head" \
            | grep -E '^lib/(features|core|app)/.+\.dart$' \
            | grep -vE '\.(g|freezed|gr|config)\.dart$' \
            || true)
          test_changed=$(git diff --name-only "$base" "$head" \
            | grep -E '^test/.+\.dart$' \
            || true)
          if [ -n "$lib_changed" ] && [ -z "$test_changed" ]; then
            echo "::error::TDD violation: lib/ changed without test/ changing."
            echo ""
            echo "Files in lib/ touched in this PR:"
            echo "$lib_changed" | sed 's/^/  - /'
            exit 1
          fi
          echo "TDD diff check passed."

  format-analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - name: Format
        run: dart format --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    runs-on: ubuntu-latest
    needs: format-analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build apk --debug

  build-web:
    runs-on: ubuntu-latest
    needs: format-analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build web

  build-ios:
    runs-on: macos-latest
    needs: format-analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build ios --no-codesign --debug

  # Add build-macos, build-windows, build-linux jobs as the project targets them.
