name: cis_crm
description: CIS CRM Flutter application.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  bloc_concurrency: ^0.3.0
  connectivity_plus: ^6.0.0
  dio: ^5.4.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  file_picker: ^8.0.0
  flutter_secure_storage: ^9.2.2
  formz: ^0.7.0
  get_it: ^7.7.0
  go_router: ^14.0.0
  hydrated_bloc: ^10.1.1
  intl: any
  json_annotation: ^4.9.0
  logger: ^2.4.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0
  flutter_widget_from_html_core: ^0.15.2
  url_launcher: ^6.2.0
  web_socket_channel: ^3.0.3
  table_calendar: ^3.2.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont.ttf

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/launcher_icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/launcher_icon.png"
  macos:
    generate: true
    image_path: "assets/launcher_icon.png"

flutter_native_splash:
  color: "#0D47A1"
  image: "assets/splash.png"
  android_12:
    color: "#0D47A1"
    image: "assets/splash.png"
  web: false
